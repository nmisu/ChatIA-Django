<div class="row g-4 mt-2">
    <div class="col-md-6">
        <div class="card shadow-sm border-primary h-100">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <span class="fw-bold">{{ result1.name }}</span>
                <span class="badge bg-light text-primary"> {{ result1.time }}s</span>
            </div>
            <div class="card-body markdown-content">
                {{ result1.content }}
            </div>
        </div>
    </div>
    
    <div class="col-md-6">
        <div class="card shadow-sm border-success h-100">
            <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                <span class="fw-bold">{{ result2.name }}</span>
                <span class="badge bg-light text-success"> {{ result2.time }}s</span>
            </div>
            <div class="card-body markdown-content">
                {{ result2.content }}
            </div>
        </div>
    </div>
</div>

<div class="text-center mt-4 mb-2">
    <span class="badge bg-secondary mb-2">Este duelo se ha guardado en tu historial</span>
    <br>
    <a href="{% url 'conversation_detail' saved_conv_id %}" class="btn btn-outline-dark btn-sm">Ir a la conversación</a>
</div>
